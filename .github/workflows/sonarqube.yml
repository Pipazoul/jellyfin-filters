name: SonarQube

# Static analysis of the plugin's C# code. Runs the SonarScanner for .NET
# around a Release build and publishes the results to the SonarQube server.
#
# Requires two repository secrets (already configured):
#   SONAR_TOKEN     - a SonarQube analysis token
#   SONAR_HOST_URL  - the base URL of the SonarQube server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Secrets are not available to pull requests from forks; skip those so the
    # workflow does not fail with a missing-token error on external PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          # Full history lets SonarQube attribute issues and detect new code.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache SonarScanner for .NET
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner

      - name: Install SonarScanner for .NET
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool update dotnet-sonarscanner --tool-path ~/.sonar/scanner

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ~/.sonar/scanner/dotnet-sonarscanner begin \
            /k:"jellyfin-filters" \
            /n:"Jellyfin Duration Filter" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL"
          dotnet build JellyfinPluginDurationFilter.sln -c Release
          ~/.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
